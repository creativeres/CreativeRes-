<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Disorganization Dungeon</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="game-shell">
    <header class="top-bar">
      <div>
        <h1>🗃️ Disorganization Dungeon</h1>
        <p class="subtitle">Grades 5–8 • Organization &amp; Planning Quest</p>
      </div>
      <div class="status-grid">
        <p><strong>Room:</strong> <span id="room-count">1</span>/3</p>
        <p><strong>Turns Left:</strong> <span id="turns-left">12</span></p>
        <p><strong>Score:</strong> <span id="score">0</span></p>
      </div>
    </header>

    <section class="mission-panel">
      <h2>Mission Brief</h2>
      <p id="mission-text"></p>
      <p class="tip"><strong>Hint:</strong> Plan first, then sort by category and importance!</p>
    </section>

    <section class="room-panel">
      <h2 id="room-name"></h2>
      <div class="layout">
        <div>
          <h3>Clutter Pile</h3>
          <div id="clutter-pile" class="drop-zone"></div>
        </div>
        <div class="bins">
          <div>
            <h3>School Supplies</h3>
            <div id="school" class="drop-zone"></div>
          </div>
          <div>
            <h3>Trash/Recycling</h3>
            <div id="trash" class="drop-zone"></div>
          </div>
          <div>
            <h3>Keep at Home</h3>
            <div id="home" class="drop-zone"></div>
          </div>
          <div>
            <h3>Important Papers</h3>
            <div id="important" class="drop-zone"></div>
          </div>
        </div>
      </div>
    </section>

    <section class="controls">
      <button id="plan-btn">Use Planning Move (+2 turns, no score)</button>
      <button id="check-btn">Check Organization</button>
      <button id="next-room-btn" disabled>Enter Next Room</button>
      <button id="restart-btn">Restart Quest</button>
    </section>

    <section class="log-panel">
      <h2>Strategy Log</h2>
      <ul id="log"></ul>
    </section>
  </main>

  <template id="item-template">
    <button class="item" type="button"></button>
  </template>

  <script src="script.js"></script>
</body>
</html>
